<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meridian</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0b;
      --bg-elev: #131316;
      --bg-input: #1c1c20;
      --text: #e7e7ea;
      --text-dim: #8b8b93;
      --accent: #4cc9f0;
      --user-bubble: #1f2937;
      --agent-bubble: #16181c;
      --error: #ef4444;
      --border: #25252a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 18px 20px 14px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 17px;
      margin: 0;
      letter-spacing: 0.01em;
    }
    header .meta {
      font-size: 12px;
      color: var(--text-dim);
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
    }
    .msg.agent {
      align-self: flex-start;
      background: var(--agent-bubble);
      border: 1px solid var(--border);
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--text-dim);
      font-size: 13px;
      max-width: 90%;
      text-align: center;
    }
    .msg.error {
      align-self: center;
      background: rgba(239, 68, 68, 0.08);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
      font-size: 13px;
    }
    .typing {
      align-self: flex-start;
      color: var(--text-dim);
      font-size: 13px;
      padding: 4px 14px;
    }
    form {
      padding: 14px 16px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    textarea {
      flex: 1;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font: inherit;
      resize: none;
      min-height: 44px;
      max-height: 200px;
    }
    textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    button {
      background: var(--accent);
      color: #0a0a0b;
      border: 0;
      border-radius: 10px;
      padding: 0 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .config {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
    }
    .config label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .config-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }
    .config-row input {
      flex: 1;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font: inherit;
      font-size: 13px;
    }
    .config-row button {
      padding: 8px 14px;
      font-size: 13px;
    }
    .config.hidden { display: none; }
    .config-toggle {
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      padding: 0;
      cursor: pointer;
      text-decoration: underline;
    }
    .config-toggle:hover { color: var(--text); }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Meridian</h1>
      <div class="meta">
        <span id="session-status">disconnected</span>
        &middot;
        <button class="config-toggle" id="config-toggle">settings</button>
      </div>
    </header>

    <section class="config hidden" id="config">
      <div class="config-row">
        <div style="flex:1">
          <label for="gateway-url">Gateway URL</label>
          <input id="gateway-url" type="text" placeholder="http://127.0.0.1:18889" />
        </div>
      </div>
      <div class="config-row">
        <div style="flex:1">
          <label for="gateway-token">Gateway Token (Bearer)</label>
          <input id="gateway-token" type="password" placeholder="MERIDIAN_GATEWAY_TOKEN" />
        </div>
        <button id="config-save">save</button>
      </div>
      <div style="font-size:12px;color:var(--text-dim)">
        Settings are stored in your browser's localStorage. Nothing leaves this page.
      </div>
    </section>

    <div class="messages" id="messages"></div>
    <form id="form">
      <textarea id="input" placeholder="Send a message…" rows="1" autofocus></textarea>
      <button type="submit" id="send">Send</button>
    </form>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const messages = $('messages');
    const form = $('form');
    const input = $('input');
    const sendBtn = $('send');
    const configEl = $('config');
    const configToggle = $('config-toggle');
    const sessionStatus = $('session-status');
    const gatewayUrlInput = $('gateway-url');
    const gatewayTokenInput = $('gateway-token');
    const configSave = $('config-save');

    const LS = {
      url: 'meridian.gatewayUrl',
      token: 'meridian.gatewayToken',
    };

    function loadConfig() {
      const url = localStorage.getItem(LS.url) || 'http://127.0.0.1:18889';
      const token = localStorage.getItem(LS.token) || '';
      gatewayUrlInput.value = url;
      gatewayTokenInput.value = token;
      sessionStatus.textContent = token ? 'configured' : 'needs token';
    }

    function saveConfig() {
      localStorage.setItem(LS.url, gatewayUrlInput.value.trim());
      localStorage.setItem(LS.token, gatewayTokenInput.value.trim());
      sessionStatus.textContent = gatewayTokenInput.value.trim() ? 'configured' : 'needs token';
      configEl.classList.add('hidden');
      addSystemMessage('Settings saved.');
    }

    function autoSizeTextarea() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    }

    function addMessage(role, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.textContent = text;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
      return el;
    }

    function addSystemMessage(text) { addMessage('system', text); }
    function addErrorMessage(text) { addMessage('error', text); }

    let typingEl = null;
    function showTyping() {
      if (typingEl) return;
      typingEl = document.createElement('div');
      typingEl.className = 'typing';
      typingEl.textContent = 'thinking…';
      messages.appendChild(typingEl);
      messages.scrollTop = messages.scrollHeight;
    }
    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    async function sendMessage(text) {
      const url = (localStorage.getItem(LS.url) || '').replace(/\/$/, '');
      const token = localStorage.getItem(LS.token) || '';
      if (!url || !token) {
        addErrorMessage('Configure gateway URL and token in settings first.');
        configEl.classList.remove('hidden');
        return;
      }
      addMessage('user', text);
      showTyping();
      sendBtn.disabled = true;
      try {
        const res = await fetch(url + '/chat', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ input: text }),
        });
        if (!res.ok) {
          const body = await res.text();
          addErrorMessage('Gateway returned ' + res.status + ': ' + body.slice(0, 200));
          return;
        }
        const json = await res.json();
        addMessage('agent', json.reply || '(empty reply)');
      } catch (err) {
        addErrorMessage('Failed to reach gateway: ' + err.message);
      } finally {
        hideTyping();
        sendBtn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      autoSizeTextarea();
      sendMessage(text);
    });

    input.addEventListener('input', autoSizeTextarea);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    configToggle.addEventListener('click', () => configEl.classList.toggle('hidden'));
    configSave.addEventListener('click', saveConfig);

    loadConfig();
    if (!localStorage.getItem(LS.token)) {
      configEl.classList.remove('hidden');
      addSystemMessage('Welcome. Configure your gateway URL and token to start chatting.');
    } else {
      addSystemMessage('Connected. Send a message to begin.');
    }
  </script>
</body>
</html>
