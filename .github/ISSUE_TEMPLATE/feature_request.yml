name: Feature request
description: Propose a capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the **use case first** — the feature is usually the answer, not
        the question. Check [ROADMAP.md](../blob/main/ROADMAP.md); it may already
        be planned.
  - type: textarea
    id: use-case
    attributes:
      label: The use case
      description: What are you trying to do, and where does Meridian get in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you have in mind
      description: A rough shape of the solution. A CLI command, a config option, a new channel/skill, etc.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Memory / poisoning defense
        - Channels
        - Skills / MCP
        - CLI / onboarding
        - Voice
        - Docs
        - Other
    validations:
      required: true
