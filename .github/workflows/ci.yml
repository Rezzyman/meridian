name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: typecheck · lint · test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Include 20 (the documented engines floor): plain Node <22 cannot import
        # a raw .ts, which is exactly where executable skills used to silently
        # fail, so the build + test must be green here or that class of bug ships.
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
